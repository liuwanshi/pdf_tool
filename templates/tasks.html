{% extends "base.html" %}
{% block title %}任务列表 - PDF 处理工具{% endblock %}
{% block content %}

<h2 class="mb-4">任务列表</h2>

<div class="table-responsive">
    <table class="table table-hover" id="tasks-table">
        <thead>
            <tr>
                <th>文件名</th>
                <th>类型</th>
                <th>进度</th>
                <th>状态</th>
                <th>创建时间</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr id="tasks-empty">
                <td colspan="6" class="text-center text-muted">暂无任务</td>
            </tr>
        </tbody>
    </table>
</div>

<!-- 分页导航 -->
<nav id="pagination-nav" class="d-none">
    <ul class="pagination justify-content-center mb-0" id="pagination-list"></ul>
</nav>

<div class="d-flex justify-content-between align-items-center mt-2">
    <small class="text-muted" id="task-count"></small>
    <span id="poll-status" class="text-muted small">自动刷新中...</span>
</div>

{% endblock %}
{% block scripts %}
<script>
const TYPE_MAP = {
    ocr: 'OCR 可搜索 PDF',
    compress: 'PDF 压缩',
    split: 'PDF 拆分',
    merge: '合并 PDF',
    batch_ocr: '批量 OCR',
};

let currentPage = 1;
const perPage = 10;

function statusBadge(status) {
    if (status === 'processing') return '<span class="badge bg-warning text-dark">处理中</span>';
    if (status === 'completed')  return '<span class="badge bg-success">已完成</span>';
    if (status === 'failed')     return '<span class="badge bg-danger">任务失败</span>';
    if (status === 'interrupted') return '<span class="badge bg-secondary">已中断</span>';
    return `<span class="badge bg-light text-dark">${escapeHtml(status)}</span>`;
}

function actionButtons(t) {
    let html = '';
    if (t.status === 'completed') {
        html += `<a href="/download/${t.id}" class="btn btn-sm btn-success me-1">下载</a>`;
    }
    if (t.status === 'failed' || t.status === 'interrupted') {
        html += `<button class="btn btn-sm btn-outline-primary retry-btn me-1" data-task-id="${t.id}">重试</button>`;
    }
    if (t.status !== 'processing') {
        html += `<button class="btn btn-sm btn-outline-danger delete-btn" data-task-id="${t.id}" data-filename="${escapeHtml(t.original_filename)}">删除</button>`;
    }
    return html;
}

async function retryTask(taskId, btn) {
    btn.disabled = true;
    btn.textContent = '提交中...';
    try {
        const resp = await fetch(`/api/task/${taskId}/retry`, { method: 'POST' });
        const result = await resp.json();
        if (result.error) {
            alert('重试失败: ' + result.error);
            btn.disabled = false;
            btn.textContent = '重试';
        } else {
            btn.textContent = '已提交';
            btn.classList.replace('btn-outline-primary', 'btn-outline-success');
            pollTasks();
        }
    } catch (err) {
        alert('重试请求失败: ' + err.message);
        btn.disabled = false;
        btn.textContent = '重试';
    }
}

async function deleteTask(taskId, filename) {
    if (!confirm(`确定要删除任务「${filename}」吗？\n\n删除后任务记录和关联文件将永久移除。`)) {
        return;
    }
    try {
        const resp = await fetch(`/api/task/${taskId}`, { method: 'DELETE' });
        const result = await resp.json();
        if (result.error) {
            alert('删除失败: ' + result.error);
        } else {
            pollTasks();
        }
    } catch (err) {
        alert('删除请求失败: ' + err.message);
    }
}

function renderPagination(totalPages) {
    const nav = document.getElementById('pagination-nav');
    const list = document.getElementById('pagination-list');

    if (totalPages <= 1) {
        nav.classList.add('d-none');
        return;
    }
    nav.classList.remove('d-none');

    let html = '';
    // 上一页
    html += `<li class="page-item ${currentPage <= 1 ? 'disabled' : ''}">
        <a class="page-link" href="#" data-page="${currentPage - 1}">&laquo;</a></li>`;

    // 页码
    for (let p = 1; p <= totalPages; p++) {
        if (p === currentPage) {
            html += `<li class="page-item active"><span class="page-link">${p}</span></li>`;
        } else if (Math.abs(p - currentPage) <= 2 || p === 1 || p === totalPages) {
            html += `<li class="page-item"><a class="page-link" href="#" data-page="${p}">${p}</a></li>`;
        } else if (p === 2 && currentPage > 4) {
            html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        } else if (p === totalPages - 1 && currentPage < totalPages - 3) {
            html += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        }
    }

    // 下一页
    html += `<li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}">
        <a class="page-link" href="#" data-page="${currentPage + 1}">&raquo;</a></li>`;

    list.innerHTML = html;

    // 绑定分页点击
    list.querySelectorAll('a.page-link[data-page]').forEach(a => {
        a.addEventListener('click', function(e) {
            e.preventDefault();
            const p = parseInt(this.dataset.page);
            if (p >= 1 && p <= totalPages) {
                currentPage = p;
                pollTasks();
            }
        });
    });
}

async function pollTasks() {
    try {
        const resp = await fetch(`/api/tasks?page=${currentPage}&per_page=${perPage}`);
        const data = await resp.json();
        const tasks = data.tasks;
        const total = data.total;
        const totalPages = data.total_pages;
        const tbody = document.querySelector('#tasks-table tbody');
        const emptyRow = document.getElementById('tasks-empty');

        if (tasks.length === 0) {
            tbody.innerHTML = '';
            if (emptyRow) tbody.appendChild(emptyRow);
            document.getElementById('task-count').textContent = '';
        } else {
            if (emptyRow) emptyRow.remove();
            tbody.innerHTML = tasks.map(t => `
                <tr>
                    <td title="${escapeHtml(t.id)}">${escapeHtml(t.original_filename)}</td>
                    <td>${TYPE_MAP[t.task_type] || t.task_type}</td>
                    <td>
                        <div class="progress" style="height: 16px;">
                            <div class="progress-bar${t.status === 'interrupted' ? ' bg-secondary' : ''}"
                                 style="width: ${t.progress}%">${t.progress}%</div>
                        </div>
                    </td>
                    <td>${statusBadge(t.status)}${t.error_message ? '<br><small class="' +
                        (t.status === 'failed' || t.status === 'interrupted' ? 'text-danger' : 'text-muted')
                        + '">' + escapeHtml(t.error_message) + '</small>' : ''}</td>
                    <td>${t.created_at || '-'}</td>
                    <td>${actionButtons(t)}</td>
                </tr>
            `).join('');

            // 绑定按钮事件
            tbody.querySelectorAll('.retry-btn').forEach(btn => {
                btn.addEventListener('click', function() { retryTask(this.dataset.taskId, this); });
            });
            tbody.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() { deleteTask(this.dataset.taskId, this.dataset.filename); });
            });

            document.getElementById('task-count').textContent =
                `共 ${total} 个任务，第 ${data.page}/${totalPages} 页`;
        }

        renderPagination(totalPages);
        document.getElementById('poll-status').textContent =
            '上次刷新: ' + new Date().toLocaleTimeString();
    } catch (err) {
        document.getElementById('poll-status').textContent = '刷新失败: ' + err.message;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 立即加载 + 每3秒轮询
pollTasks();
setInterval(pollTasks, 3000);
</script>
{% endblock %}
