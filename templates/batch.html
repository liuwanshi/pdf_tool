{% extends "base.html" %}
{% block title %}批量处理 - PDF 处理工具{% endblock %}
{% block content %}

<h2 class="mb-4">批量处理</h2>

<div class="row">
    <!-- 批量合并 -->
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">📎 合并 PDF</h5>
                <p class="card-text text-muted">最多 10 个文件，按顺序合并为一个 PDF，可选压缩。</p>
                <form class="batch-form" data-task-type="merge">
                    <div class="drop-zone rounded p-3 mb-3" style="border: 2px dashed #dee2e6; transition: border-color .2s;">
                        <label class="form-label">选择文件（可多选，或拖拽文件到此区域）</label>
                        <div class="input-group">
                            <button type="button" class="btn btn-outline-secondary file-pick-btn">选择文件</button>
                            <span class="form-control file-status-text" style="background:#e9ecef;">未选择文件</span>
                            <input type="file" class="d-none" name="files" multiple
                                   accept=".pdf,.png,.jpg,.jpeg,.bmp,.tiff">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">目标大小 (KB)，留空不压缩</label>
                        <input type="number" class="form-control" name="target_kb" min="1" placeholder="如 2048">
                    </div>
                    <div class="sortable-list mb-3" id="merge-file-list"></div>
                    <button type="submit" class="btn btn-primary w-100">开始合并</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 批量 OCR -->
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-body">
                <h5 class="card-title">🔍 批量 OCR</h5>
                <p class="card-text text-muted">最多 10 个文件，逐个 OCR 后可搜索 PDF，结果打包 ZIP。</p>
                <form class="batch-form" data-task-type="batch_ocr">
                    <div class="drop-zone rounded p-3 mb-3" style="border: 2px dashed #dee2e6; transition: border-color .2s;">
                        <label class="form-label">选择文件（可多选，或拖拽文件到此区域）</label>
                        <div class="input-group">
                            <button type="button" class="btn btn-outline-secondary file-pick-btn">选择文件</button>
                            <span class="form-control file-status-text" style="background:#e9ecef;">未选择文件</span>
                            <input type="file" class="d-none" name="files" multiple
                                   accept=".pdf,.png,.jpg,.jpeg,.bmp,.tiff">
                        </div>
                    </div>
                    <div class="sortable-list mb-3" id="batch-ocr-file-list"></div>
                    <button type="submit" class="btn btn-primary w-100">开始批量 OCR</button>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 任务进度提示 -->
<div id="task-toast" class="alert alert-info d-none mt-3" role="alert">
    <span id="task-toast-msg"></span>
    <a href="/tasks">查看任务列表 →</a>
</div>

{% endblock %}
{% block scripts %}
<script>
document.querySelectorAll('.batch-form').forEach(form => {
    const fileInput = form.querySelector('input[type="file"]');
    const listEl = form.querySelector('.sortable-list');
    const dropZone = form.querySelector('.drop-zone');

    // 主数据：累积文件数组（允许追加/删除/拖拽排序）
    let accumulatedFiles = [];
    const fileNameSet = new Set();
    let dragIndex = null;  // 当前拖拽中的索引

    // 自定义文件选择器按钮 → 触发隐藏的 input
    const pickBtn = form.querySelector('.file-pick-btn');
    const statusText = form.querySelector('.file-status-text');
    if (pickBtn && fileInput) {
        pickBtn.addEventListener('click', () => fileInput.click());
    }

    // ---- 渲染文件列表 ----
    function renderFileList() {
        if (!listEl) return;
        listEl.innerHTML = '';

        if (statusText) {
            const n = accumulatedFiles.length;
            statusText.textContent = n > 0 ? `已选择 ${n} 个文件` : '未选择文件';
        }

        if (accumulatedFiles.length === 0) return;
        accumulatedFiles.forEach((f, i) => {
            listEl.innerHTML += `<div class="list-group-item d-flex justify-content-between align-items-center sortable-item"
                draggable="true" data-index="${i}">
                <span><span class="drag-handle me-2" style="cursor:grab;color:#aaa;">⠿</span>${i + 1}. ${f.name}</span>
                <span>
                    <small class="text-muted me-2">${(f.size / 1024).toFixed(1)} KB</small>
                    <button type="button" class="btn btn-sm btn-outline-danger file-remove-btn" data-index="${i}" title="移除此文件">&times;</button>
                </span>
            </div>`;
        });

        // 绑定拖拽事件
        listEl.querySelectorAll('.sortable-item').forEach(item => {
            item.addEventListener('dragstart', handleDragStart);
            item.addEventListener('dragover', handleDragOver);
            item.addEventListener('dragleave', handleDragLeave);
            item.addEventListener('drop', handleDrop);
            item.addEventListener('dragend', handleDragEnd);
        });
    }

    // ---- 删除 ----
    function removeFile(index) {
        const removed = accumulatedFiles[index];
        fileNameSet.delete(removed.name);
        accumulatedFiles.splice(index, 1);
        renderFileList();
    }

    // ---- 追加（去重） ----
    function appendFiles(newFiles) {
        const skipped = [];
        let added = 0;
        for (const f of newFiles) {
            if (fileNameSet.has(f.name)) {
                skipped.push(f.name);
                continue;
            }
            if (accumulatedFiles.length >= 10) {
                alert('最多上传 10 个文件，已忽略超出部分');
                break;
            }
            fileNameSet.add(f.name);
            accumulatedFiles.push(f);
            added++;
        }
        if (skipped.length > 0) {
            alert('以下文件已存在，跳过：\n' + skipped.join('\n'));
        }
        if (added > 0) renderFileList();
    }

    // ---- 列表拖拽排序 ----
    function handleDragStart(e) {
        dragIndex = parseInt(this.dataset.index);
        this.style.opacity = '0.5';
        e.dataTransfer.effectAllowed = 'move';
    }

    function handleDragOver(e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        this.classList.add('border-top', 'border-primary');
    }

    function handleDragLeave() {
        this.classList.remove('border-top', 'border-primary');
    }

    function handleDrop(e) {
        e.preventDefault();
        this.classList.remove('border-top', 'border-primary');
        const targetIndex = parseInt(this.dataset.index);
        if (dragIndex !== null && dragIndex !== targetIndex) {
            const [moved] = accumulatedFiles.splice(dragIndex, 1);
            accumulatedFiles.splice(targetIndex, 0, moved);
            renderFileList();
        }
        dragIndex = null;
    }

    function handleDragEnd() {
        this.style.opacity = '1';
        listEl.querySelectorAll('.sortable-item').forEach(el =>
            el.classList.remove('border-top', 'border-primary'));
        dragIndex = null;
    }

    // ---- 桌面拖拽上传 ----
    if (dropZone) {
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            dropZone.style.borderColor = '#0d6efd';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '#dee2e6';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#dee2e6';
            if (e.dataTransfer.files.length > 0) {
                appendFiles(e.dataTransfer.files);
            }
        });
    }

    // ---- 按钮选择文件 ----
    if (fileInput && listEl) {
        fileInput.addEventListener('change', () => {
            const files = Array.from(fileInput.files);
            if (files.length > 0) {
                appendFiles(files);
                try { fileInput.value = null; } catch(e) {}
            }
        });

        // 委托：删除按钮
        listEl.addEventListener('click', (e) => {
            const btn = e.target.closest('.file-remove-btn');
            if (btn) {
                removeFile(parseInt(btn.dataset.index));
            }
        });
    }

    // ---- 提交 ----
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const taskType = form.dataset.taskType;
        const btn = form.querySelector('button[type="submit"]');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            if (accumulatedFiles.length === 0) { alert('请选择文件'); btn.disabled = false; btn.textContent = '开始'; return; }

            const uploadForm = new FormData();
            for (const f of accumulatedFiles) { uploadForm.append('files', f); }
            const uploadResp = await fetch('/upload/batch', { method: 'POST', body: uploadForm });
            const uploadResult = await uploadResp.json();
            if (uploadResult.error) { alert(uploadResult.error); btn.disabled = false; btn.textContent = '开始'; return; }

            const taskData = {
                task_type: taskType,
                filepaths: uploadResult.files.map(f => f.filepath),
                filenames: uploadResult.files.map(f => f.filename),
            };
            if (taskType === 'merge') {
                const tkb = form.querySelector('input[name="target_kb"]').value;
                if (tkb) taskData.target_kb = parseFloat(tkb);
            }

            const taskResp = await fetch('/api/task/create', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(taskData)
            });
            const taskResult = await taskResp.json();
            if (taskResult.error) { alert(taskResult.error); btn.disabled = false; btn.textContent = '开始'; return; }

            accumulatedFiles = [];
            fileNameSet.clear();
            renderFileList();

            const toast = document.getElementById('task-toast');
            toast.classList.remove('d-none');
            document.getElementById('task-toast-msg').textContent =
                `批量任务已创建 (ID: ${taskResult.task_id.slice(0, 8)}...)，正在处理中...`;
        } catch (err) {
            alert('提交失败: ' + err.message);
        }
        btn.disabled = false;
        btn.textContent = '开始';
    });
});
</script>
{% endblock %}
